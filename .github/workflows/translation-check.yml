name: Translation freshness check

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'templates/**'
      - 'README.md'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for outdated translations
        shell: bash
        run: |
          outdated=()

          for translation in $(find i18n -name '*.md' 2>/dev/null); do
            source=$(sed -n 's/^source: *//p' "$translation" | head -1)
            [ -z "$source" ] && continue
            [ ! -f "$source" ] && continue

            stored_hash=$(sed -n 's/^source_hash: *//p' "$translation" | head -1)
            [ -z "$stored_hash" ] && continue

            current_hash=$(git hash-object "$source" | head -c 7)

            if [ "$stored_hash" != "$current_hash" ]; then
              lang=$(echo "$translation" | cut -d'/' -f2)
              outdated+=("- \`$translation\` (source: \`$source\`, expected: \`$current_hash\`, has: \`$stored_hash\`)")
            fi
          done

          if [ ${#outdated[@]} -gt 0 ]; then
            body="The following translations are outdated after recent changes:\n\n"
            for item in "${outdated[@]}"; do
              body+="$item\n"
            done
            body+="\nPlease update the translations and set \`source_hash\` to the current value."

            echo "OUTDATED_BODY<<EOF" >> $GITHUB_ENV
            echo -e "$body" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "HAS_OUTDATED=true" >> $GITHUB_ENV
          fi

      - name: Create issue for outdated translations
        if: env.HAS_OUTDATED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'i18n,automated',
              state: 'open'
            });

            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: process.env.OUTDATED_BODY
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Translation outdated',
                body: process.env.OUTDATED_BODY,
                labels: ['i18n', 'automated']
              });
            }
